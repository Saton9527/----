services:
  mysql:
    image: mysql:8.0
    container_name: acm_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: acm_train
      MYSQL_USER: acm_user
      MYSQL_PASSWORD: acm_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend-spring/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../backend-spring/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro

  backend:
    build:
      context: ../backend-spring
    container_name: acm_backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: acm_train
      DB_USER: acm_user
      DB_PASS: acm_pass
      MAIL_HOST: smtp.example.com
      MAIL_PORT: 587
      MAIL_USERNAME: bot@example.com
      MAIL_PASSWORD: change-me
      MAIL_FROM: bot@example.com
      # Use a comma-separated ordered list when you have multiple mirrors.
      ATC_SUBMISSIONS_ENABLED: "true"
      ATC_SUBMISSIONS_API_BASE_URL: https://kenkoooo.com/atcoder/atcoder-api/v3
      ATC_PROBLEM_API_BASE_URL: https://kenkoooo.com/atcoder/resources
      ATC_REQUEST_INTERVAL_MS: 1200
      CONTEST_SYNC_ENABLED: "true"
      CONTEST_SYNC_CRON: "0 0 */4 * * *"
      CONTEST_REMINDER_ENABLED: "true"
      CONTEST_REMINDER_CRON: "0 */10 * * * *"
      CF_REMINDER_MINUTES: 120
      ATC_REMINDER_MINUTES: 120
      CONTEST_MAIL_TO: coach1@example.com,coach2@example.com
      ALERT_MAIL_ENABLED: "true"
      ALERT_MAIL_CRON: "0 */10 * * * *"
      ALERT_MAIL_TO: coach1@example.com,coach2@example.com
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build:
      context: ../frontend
    container_name: acm_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
