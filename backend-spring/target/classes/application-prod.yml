server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:acm_train}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:acm_user}
    password: ${DB_PASS:acm_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: never
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.hibernate.SQL: warn

acm:
  sync:
    scheduler-enabled: false
    cron: "0 0 */6 * * *"
  contest:
    sync-enabled: false
    sync-cron: "0 0 */4 * * *"
    reminder-enabled: false
    reminder-cron: "0 */10 * * * *"
    cf-reminder-minutes: 120
    atc-reminder-minutes: 120
    mail:
      from: ${CONTEST_MAIL_FROM:${MAIL_FROM:no-reply@acmtrain.local}}
      to: ${CONTEST_MAIL_TO:${ALERT_MAIL_TO:}}
  alert:
    mail:
      enabled: false
      cron: "0 */10 * * * *"
      from: ${MAIL_FROM:no-reply@acmtrain.local}
      to: ${ALERT_MAIL_TO:}
