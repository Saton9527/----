server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:h2:file:./.codex-run/acmtrain-demo;MODE=MYSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        batch_size: 50
        fetch_size: 20
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.hibernate.SQL: warn

acm:
  account-validation:
    connect-timeout-ms: ${ACCOUNT_VALIDATION_CONNECT_TIMEOUT_MS:2000}
    request-timeout-ms: ${ACCOUNT_VALIDATION_REQUEST_TIMEOUT_MS:3000}
  coach-task:
    mail:
      enabled: ${COACH_TASK_MAIL_ENABLED:false}
      from: ${COACH_TASK_MAIL_FROM:${MAIL_FROM:no-reply@acmtrain.local}}
  team:
    mail:
      enabled: ${TEAM_INVITE_MAIL_ENABLED:false}
      from: ${TEAM_INVITE_MAIL_FROM:${MAIL_FROM:no-reply@acmtrain.local}}
  sync:
    scheduler-enabled: false
    cron: "0 0 */6 * * *"
    atc-submissions-enabled: true
    # Supports a comma-separated ordered list of mirror base URLs.
    atc-submissions-api-base-url: ${ATC_SUBMISSIONS_API_BASE_URL:https://kenkoooo.com/atcoder/atcoder-api/v3}
    # Supports a comma-separated ordered list of mirror base URLs.
    atc-problem-api-base-url: ${ATC_PROBLEM_API_BASE_URL:https://kenkoooo.com/atcoder/resources}
    atc-request-interval-ms: ${ATC_REQUEST_INTERVAL_MS:1200}
  contest:
    sync-enabled: ${CONTEST_SYNC_ENABLED:false}
    sync-cron: ${CONTEST_SYNC_CRON:0 0 */4 * * *}
    reminder-enabled: ${CONTEST_REMINDER_ENABLED:false}
    reminder-cron: ${CONTEST_REMINDER_CRON:0 */10 * * * *}
    cf-reminder-minutes: ${CF_REMINDER_MINUTES:120}
    atc-reminder-minutes: ${ATC_REMINDER_MINUTES:120}
    mail:
      from: ${CONTEST_MAIL_FROM:${MAIL_FROM:no-reply@acmtrain.local}}
      to: ${CONTEST_MAIL_TO:${ALERT_MAIL_TO:}}
  alert:
    mail:
      enabled: ${ALERT_MAIL_ENABLED:false}
      cron: ${ALERT_MAIL_CRON:0 */10 * * * *}
      from: ${MAIL_FROM:no-reply@acmtrain.local}
      to: ${ALERT_MAIL_TO:}
