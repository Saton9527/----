server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:h2:file:./.codex-run/acmtrain-demo;MODE=MYSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        batch_size: 50
        fetch_size: 20
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.hibernate.SQL: warn

acm:
  sync:
    scheduler-enabled: false
    cron: "0 0 */6 * * *"
  contest:
    sync-enabled: false
    sync-cron: "0 0 */4 * * *"
    reminder-enabled: false
    reminder-cron: "0 */10 * * * *"
    cf-reminder-minutes: 120
    atc-reminder-minutes: 120
    mail:
      from: ${CONTEST_MAIL_FROM:${MAIL_FROM:no-reply@acmtrain.local}}
      to: ${CONTEST_MAIL_TO:${ALERT_MAIL_TO:}}
  alert:
    mail:
      enabled: false
      cron: "0 */10 * * * *"
      from: ${MAIL_FROM:no-reply@acmtrain.local}
      to: ${ALERT_MAIL_TO:}
